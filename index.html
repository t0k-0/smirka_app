<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Šmírka Mobile</title>
<!-- PWA install support -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Šmírka">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" id="pwa-apple-icon">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;touch-action:manipulation;}
input,button,select,textarea{font-family:inherit;}
button{cursor:pointer;border:none;background:none;}

/* ===== THEME ===== */
:root{
  --bg:#0a0a0a; --surf:#161616; --surf2:#222; --surf3:#2a2a2a;
  --brd:#2e2e2e; --brd2:#484848;
  --txt:#f2f2f2; --txt2:#9a9a9a; --txt3:#505050;
  --tow:#e07800; --tow-bg:rgba(224,120,0,.14); --tow-brd:rgba(224,120,0,.42);
  --gli:#e8e8e8; --gli-bg:rgba(232,232,232,.06); --gli-brd:rgba(232,232,232,.26);
  --mot:#22aa44; --mot-bg:rgba(34,170,68,.12); --mot-brd:rgba(34,170,68,.38);
  --acc:#1166ff; --red:#dd1111; --grn:#009944;
  --z1:rgba(255,255,255,.045);
}
[data-theme="light"]{
  --bg:#d8d8d8; --surf:#ffffff; --surf2:#f4f4f4; --surf3:#ebebeb;
  --brd:#d0d0d0; --brd2:#a0a0a0;
  --txt:#0a0a0a; --txt2:#555; --txt3:#aaa;
  --gli:#111; --gli-bg:rgba(0,0,0,.05); --gli-brd:rgba(0,0,0,.22);
  --z1:rgba(0,0,0,.05);
}

/* ===== SHELL ===== */
#app{display:flex;flex-direction:column;height:100dvh;height:100vh;background:var(--bg);color:var(--txt);overflow:hidden;font-family:'Barlow Condensed','Arial Narrow',sans-serif;}

/* ===== HEADER ===== */
#hdr{height:46px;background:var(--surf);border-bottom:2px solid var(--brd2);display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;z-index:5;}
.log-pull{display:flex;align-items:center;gap:5px;cursor:pointer;padding:6px 10px 6px 0;border-right:1px solid var(--brd);margin-right:2px;}
.log-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;}
.log-arr{font-size:9px;color:var(--txt3);}
.date-str{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:1px;color:var(--txt);flex:1;}
.hdr-btns{display:flex;gap:5px;}
.hdr-btn{background:var(--surf2);border:1px solid var(--brd2);color:var(--txt);font-size:11px;font-weight:700;letter-spacing:1.5px;padding:5px 10px;border-radius:2px;text-transform:uppercase;white-space:nowrap;}

/* ===== PANELS ===== */
.panel{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
#top-panel{border-bottom:2px solid var(--brd2);}
#composer-panel{background:var(--surf);border-bottom:2px solid var(--brd2);overflow:hidden;}
#bottom-panel{background:var(--bg);}
.panel-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--txt3);font-weight:700;padding:3px 10px;border-bottom:1px solid var(--brd);flex-shrink:0;display:flex;align-items:center;gap:8px;}
.panel-label .cnt{color:var(--acc);font-family:'Share Tech Mono',monospace;}

/* ===== AIRBORNE ===== */
#airborne-scroll{flex:1;overflow-y:auto;padding:4px;}
.no-abn{display:flex;align-items:center;justify-content:center;height:100%;color:var(--txt3);font-size:10px;letter-spacing:3px;text-transform:uppercase;}
.abn-entry{background:var(--surf);border:1px solid var(--brd);border-radius:3px;overflow:hidden;margin-bottom:4px;transition:border-color .15s,box-shadow .15s;}
.abn-entry.aerotow{border-left:3px solid var(--tow);}
.abn-entry.single-tow{border-left:3px solid var(--tow);}
.abn-entry.single-glider{border-left:3px solid var(--gli);}
.abn-entry.single-motorized{border-left:3px solid var(--mot);}
/* Selected-for-landing: whole entry glows red */
.abn-entry.land-sel{border-color:var(--red)!important;box-shadow:0 0 0 2px rgba(221,17,17,.35);}
.abn-badge{font-size:8px;letter-spacing:2px;font-weight:700;text-transform:uppercase;padding:2px 8px;background:var(--surf2);color:var(--txt3);}
.abn-row{display:flex;align-items:center;padding:8px 10px;gap:8px;min-height:50px;border-bottom:1px solid var(--brd);transition:background .1s;}
.abn-row:last-child{border-bottom:none;}
.abn-row.done{opacity:.38;pointer-events:none;}
/* Undone rows are full tap targets */
.abn-row:not(.done){cursor:pointer;}
.abn-row:not(.done):active{background:var(--z1);}
/* Selected sub-row tint */
.abn-row.land-sel{background:rgba(221,17,17,.10);}
.fn-badge{font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 5px;border-radius:2px;flex-shrink:0;text-transform:uppercase;}
.fn-badge.tow{background:var(--tow-bg);color:var(--tow);border:1px solid var(--tow-brd);}
.fn-badge.glider{background:var(--gli-bg);color:var(--gli);border:1px solid var(--gli-brd);}
.fn-badge.motorized{background:var(--mot-bg);color:var(--mot);border:1px solid var(--mot-brd);}
.abn-info{flex:1;min-width:0;}
.abn-reg{font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:600;letter-spacing:1px;line-height:1.1;}
.abn-reg.tow{color:var(--tow);}
.abn-reg.glider{color:var(--gli);}
.abn-reg.motorized{color:var(--mot);}
.abn-pilot{font-size:12px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.abn-time-col{text-align:right;flex-shrink:0;}
.abn-time{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--txt2);}
.abn-ldg{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--grn);}
/* Tap-arrow replacing the old tiny LAND button */
.abn-tap-arr{font-size:18px;color:var(--red);flex-shrink:0;opacity:.7;line-height:1;}
.ldg-ok{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--grn);font-weight:700;padding:0 4px;flex-shrink:0;}

/* ===== COMPOSER ===== */
#mode-bar{display:flex;align-items:center;justify-content:center;height:32px;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--surf2);position:relative;user-select:none;}
.swipe-hint{position:absolute;font-size:10px;font-weight:700;color:var(--txt3);top:50%;transform:translateY(-50%);letter-spacing:1px;}
.swipe-hint.L{left:10px;}
.swipe-hint.R{right:10px;}
.mode-tabs{display:flex;background:var(--surf2);border:1px solid var(--brd2);border-radius:3px;overflow:hidden;}
.mode-tab{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);padding:5px 16px;transition:background .1s,color .1s;cursor:pointer;}
.mode-tab.active{background:var(--txt);color:var(--bg);}

#composer-body{flex:1;display:flex;flex-direction:column;padding:6px;gap:6px;min-height:0;}
#composer-body.sl{animation:slideL .2s ease-out;}
#composer-body.sr{animation:slideR .2s ease-out;}
@keyframes slideL{from{transform:translateX(55px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideR{from{transform:translateX(-55px);opacity:0}to{transform:translateX(0);opacity:1}}

/* SLOTS */
.slot-card{flex:1;border:2px solid var(--brd);border-radius:4px;cursor:pointer;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:0;transition:border-color .12s,box-shadow .12s;}
.slot-card.slot-empty{align-items:center;justify-content:center;background:var(--surf2);}
.slot-card:active{opacity:.78;}
.slot-card.focused{box-shadow:0 0 0 2px var(--acc);}
.slot-card.tow-type{border-color:var(--tow-brd);}
.slot-card.tow-type.focused{box-shadow:0 0 0 2px var(--tow);}
.slot-card.glider-type{border-color:var(--gli-brd);}
.slot-card.glider-type.focused{box-shadow:0 0 0 2px var(--gli);}
.slot-card.motorized-type{border-color:var(--mot-brd);}
.slot-card.motorized-type.focused{box-shadow:0 0 0 2px var(--mot);}
.slot-top-bar{height:3px;flex-shrink:0;width:100%;}
.slot-top-bar.tow{background:var(--tow);}
.slot-top-bar.glider{background:var(--gli);}
.slot-top-bar.motorized{background:var(--mot);}
.slot-empty-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--txt3);}
.slot-empty-sub{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-top:4px;opacity:.6;}
.slot-inner{padding:7px 10px;display:flex;flex-direction:column;gap:5px;flex:1;}
.slot-plane-row{display:flex;align-items:center;gap:7px;}
.slot-reg{font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:600;letter-spacing:2px;}
.slot-reg.tow{color:var(--tow);}
.slot-reg.glider{color:var(--gli);}
.slot-reg.motorized{color:var(--mot);}
.slot-actype{font-size:13px;color:var(--txt2);flex:1;}
.slot-clr{position:absolute;top:5px;right:6px;background:var(--surf2);border:1px solid var(--brd2);color:var(--txt2);font-size:11px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:2px;}
.slot-pilots{display:flex;gap:6px;flex-wrap:wrap;}
.p-chip{
  font-size:16px;font-weight:700;letter-spacing:.3px;
  padding:10px 14px;min-height:42px;
  background:var(--surf2);border:2px solid var(--brd);border-radius:3px;
  flex:1;display:flex;align-items:center;justify-content:center;
  text-align:center;line-height:1.2;
}
.p-chip.empty{color:var(--txt3);border-style:dashed;font-weight:600;font-size:14px;letter-spacing:1px;}

/* ===== BOTTOM ===== */
#bottom-content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.bottom-idle{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;height:100%;}
.idle-hint{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--txt3);}
.bottom-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--txt3);font-weight:700;padding:4px 10px;border-bottom:1px solid var(--brd);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.bottom-lbl-r{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--acc);cursor:pointer;}

/* ===== SELECTION GRID (planes AND pilots share same grid) ===== */
.sel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;padding:5px;overflow-y:auto;flex:1;}

/* plane card */
.plane-card{background:var(--surf);border:2px solid var(--brd);border-radius:3px;padding:9px 10px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:opacity .1s;}
.plane-card:active{opacity:.5;}
.plane-card.tow{border-color:var(--tow-brd);}
.plane-card.glider{border-color:var(--gli-brd);}
.plane-card.motorized{border-color:var(--mot-brd);}
.pc-reg{font-family:'Share Tech Mono',monospace;font-size:17px;font-weight:600;letter-spacing:1px;}
.pc-reg.tow{color:var(--tow);}
.pc-reg.glider{color:var(--gli);}
.pc-reg.motorized{color:var(--mot);}
.pc-type{font-size:12px;color:var(--txt2);}
.pc-seats{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);}
.plane-card.add-new{border-style:dashed;border-color:var(--brd2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;min-height:72px;}
.plane-card.add-new:active{opacity:.5;}
.add-new-plus{font-size:26px;font-weight:300;color:var(--txt3);line-height:1;}
.add-new-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);}

/* pilot card — same grid, bigger text */
.pilot-card{background:var(--surf);border:2px solid var(--brd2);border-radius:3px;padding:13px 10px;font-size:15px;font-weight:700;letter-spacing:.2px;cursor:pointer;text-align:center;transition:opacity .1s,border-color .12s;line-height:1.2;}
.pilot-card:active{opacity:.5;}
.pilot-card:focus{outline:none;border-color:var(--acc);}
.pilot-card.add-new{border-style:dashed;border-color:var(--brd2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;font-size:26px;font-weight:300;color:var(--txt3);line-height:1;padding:10px;}
.qadd-form{display:flex;flex-direction:column;gap:7px;padding:7px;flex:1;overflow-y:auto;}

.no-items{grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:20px;color:var(--txt3);font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;line-height:1.7;}

/* new name row at bottom of pilot view */
.pilot-new-row{display:flex;gap:5px;padding:5px;flex-shrink:0;border-top:1px solid var(--brd);}
.pilot-text-in{flex:1;background:var(--surf);border:2px solid var(--brd2);border-radius:3px;color:var(--txt);font-size:16px;font-weight:600;padding:8px 10px;outline:none;letter-spacing:.2px;}
.pilot-text-in:focus{border-color:var(--acc);}
.pilot-text-in::placeholder{color:var(--txt3);font-weight:400;font-size:14px;}
.pilot-add-btn{background:var(--acc);color:#fff;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 14px;border-radius:3px;flex-shrink:0;}
.pilot-skip-btn{background:var(--surf2);border:1px solid var(--brd2);color:var(--txt2);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:8px 10px;border-radius:3px;flex-shrink:0;}

/* ACTION BUTTONS */
.action-row{display:flex;align-items:center;gap:6px;padding:8px;height:100%;}
.btn-side{flex:1;background:var(--surf2);border:2px solid var(--brd2);color:var(--txt);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:3px;height:100%;line-height:1.3;}
.btn-log{flex:2.2;color:#fff;border-radius:3px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.btn-log .clk{font-family:'Share Tech Mono',monospace;font-size:30px;letter-spacing:2px;line-height:1;}
.btn-log .sub{font-size:10px;letter-spacing:3px;font-weight:700;text-transform:uppercase;opacity:.88;}
.btn-log.takeoff{background:var(--grn);}
.btn-log.land{background:var(--red);}
.land-ctx{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);padding:4px 8px 0;flex-shrink:0;}
.land-ctx strong{color:var(--txt);font-family:'Share Tech Mono',monospace;}

/* ===== LOG OVERLAY ===== */
#log-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateY(-100%);transition:transform .28s cubic-bezier(.3,0,.2,1);}
#log-overlay.open{transform:translateY(0);}
.log-hdr{height:46px;background:var(--surf);border-bottom:2px solid var(--brd2);display:flex;align-items:center;gap:6px;padding:0 8px;flex-shrink:0;}
.log-hdr-title{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;flex:1;}
.log-hdr-btn{background:var(--surf2);border:1px solid var(--brd2);color:var(--txt);font-size:12px;font-weight:700;letter-spacing:1px;padding:5px 10px;border-radius:2px;text-transform:uppercase;white-space:nowrap;}
.log-hdr-btn.export{background:var(--acc);border-color:var(--acc);color:#fff;}
.log-filter-bar{display:flex;align-items:center;gap:5px;padding:5px 8px;border-bottom:1px solid var(--brd);background:var(--surf);flex-shrink:0;}
.filter-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt2);flex-shrink:0;}
.filter-sel{flex:1;background:var(--surf2);border:1px solid var(--brd2);color:var(--txt);font-size:14px;font-weight:600;padding:4px 7px;border-radius:2px;}
.filter-all{background:var(--surf2);border:1px solid var(--brd2);color:var(--txt2);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 9px;border-radius:2px;}
.log-stats{padding:4px 10px;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--txt2);border-bottom:1px solid var(--brd);background:var(--surf);flex-shrink:0;font-family:'Share Tech Mono',monospace;}
.log-wrap{flex:1;overflow:auto;}
.log-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.log-tbl th{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt2);padding:5px 4px;text-align:left;background:var(--surf);border-bottom:2px solid var(--brd2);white-space:nowrap;position:sticky;top:0;}
.log-tbl td{padding:5px 4px;border-bottom:1px solid var(--brd);vertical-align:middle;white-space:nowrap;}
.log-tbl td.mono{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.5px;}
.fn-dot{width:7px;height:7px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px;}
.note-td{color:var(--txt2);font-style:italic;cursor:pointer;max-width:70px;overflow:hidden;text-overflow:ellipsis;}
.log-empty{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--txt3);font-size:10px;letter-spacing:3px;text-transform:uppercase;}
/* Editable cells in the log — times and pilot names */
.log-edit-td{cursor:pointer;transition:background .1s;}
.log-edit-td:active{background:rgba(17,102,255,.18)!important;}
@media(hover:hover){.log-edit-td:hover{text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;}}
/* UTC toggle button */
.filter-tz-btn{background:var(--surf2);border:1px solid var(--brd2);color:var(--acc);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 9px;border-radius:2px;white-space:nowrap;}
.filter-tz-btn.utc-on{background:var(--acc);border-color:var(--acc);color:#fff;}

/* ===== PRESETS OVERLAY ===== */
#presets-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.3,0,.2,1);}
#presets-overlay.open{transform:translateX(0);}
.presets-hdr{height:46px;background:var(--surf);border-bottom:2px solid var(--brd2);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;}
.presets-title{font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;flex:1;}
.presets-close{background:var(--surf2);border:1px solid var(--brd2);color:var(--txt);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 14px;border-radius:2px;}
#presets-scroll{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:14px;}
.ps-section{display:flex;flex-direction:column;gap:7px;}
.ps-sec-hdr{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--txt2);padding-bottom:4px;border-bottom:1px solid var(--brd);}
.ps-plane{background:var(--surf);border:1px solid var(--brd);border-radius:3px;padding:7px 10px;display:flex;align-items:center;gap:9px;}
.ps-plane.tow{border-left:4px solid var(--tow);}
.ps-plane.glider{border-left:4px solid var(--gli);}
.ps-plane.motorized{border-left:4px solid var(--mot);}
.ps-plane-reg{font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:600;letter-spacing:1px;min-width:72px;}
.ps-plane-reg.tow{color:var(--tow);}
.ps-plane-reg.glider{color:var(--gli);}
.ps-plane-reg.motorized{color:var(--mot);}
.ps-plane-info{flex:1;}
.ps-plane-type{font-size:13px;}
.ps-plane-meta{font-size:10px;letter-spacing:1px;color:var(--txt2);text-transform:uppercase;}
.ps-pilot{background:var(--surf);border:1px solid var(--brd);border-radius:3px;padding:7px 10px;display:flex;align-items:center;gap:9px;}
.ps-pilot-name{flex:1;font-size:14px;font-weight:600;}
.ps-del{background:none;border:1px solid var(--brd2);color:var(--txt3);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:2px;}
.add-form{background:var(--surf);border:1px solid var(--brd);border-radius:4px;padding:10px;display:flex;flex-direction:column;gap:8px;}
.form-row{display:flex;align-items:center;gap:7px;}
.form-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt2);width:52px;flex-shrink:0;}
.form-in{flex:1;background:var(--surf2);border:1px solid var(--brd2);border-radius:2px;color:var(--txt);font-family:'Share Tech Mono',monospace;font-size:15px;padding:7px 9px;outline:none;}
.form-in:focus{border-color:var(--acc);}
.form-in::placeholder{color:var(--txt3);font-family:'Barlow Condensed',sans-serif;font-size:14px;}
.form-seg{display:flex;gap:3px;flex:1;}
.seg{flex:1;background:var(--surf2);border:1px solid var(--brd);color:var(--txt2);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 3px;border-radius:2px;text-align:center;cursor:pointer;}
.seg.on{background:var(--acc);border-color:var(--acc);color:#fff;}
.seg.tow-on{background:var(--tow);border-color:var(--tow);color:#fff;}
.seg.gli-on{background:var(--surf2);border-color:var(--gli);color:var(--gli);}
.seg.mot-on{background:var(--mot);border-color:var(--mot);color:#fff;}
.form-submit{background:var(--acc);color:#fff;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:10px;border-radius:3px;width:100%;}

/* ===== TIME MODAL ===== */
#time-modal{position:fixed;inset:0;background:rgba(0,0,0,.84);z-index:400;display:none;align-items:center;justify-content:center;}
#time-modal.open{display:flex;}
.tmodal-box{background:var(--surf);border:2px solid var(--brd2);border-radius:6px;padding:18px;width:260px;display:flex;flex-direction:column;gap:10px;}
.tmodal-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--txt2);}
.tmodal-in{background:var(--surf2);border:2px solid var(--brd2);border-radius:3px;color:var(--txt);font-family:'Share Tech Mono',monospace;font-size:36px;font-weight:600;padding:8px;text-align:center;outline:none;width:100%;letter-spacing:4px;}
.tmodal-in:focus{border-color:var(--acc);}
.tmodal-btns{display:flex;gap:7px;}
.tmodal-cancel{flex:1;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px;border-radius:3px;}
.tmodal-ok{flex:1;background:var(--acc);color:#fff;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px;border-radius:3px;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px;}

/* ===== DRAG & DROP — PILOT ASSIGNMENT ===== */
.p-chip[data-slot]{cursor:pointer;transition:border-color .12s,background .12s,box-shadow .12s,transform .12s;}
.p-chip[data-slot]:active{opacity:.65;transform:scale(.96);}
.p-chip.drop-over{
  border-color:var(--acc)!important;
  background:rgba(17,102,255,.24)!important;
  color:var(--txt)!important;
  box-shadow:0 0 0 2px var(--acc);
  transform:scale(1.07);
  transition:all .08s;
}
/* Ghost: GPU-composited, no pointer events, crisp */
.pilot-drag-ghost{
  position:fixed;z-index:9999;pointer-events:none;will-change:left,top;
  border-radius:4px;font-size:14px;font-weight:700;letter-spacing:.2px;
  padding:12px 10px;text-align:center;line-height:1.2;
  background:var(--surf);border:2px solid var(--acc);color:var(--txt);
  box-shadow:0 12px 36px rgba(0,0,0,.65),0 2px 8px rgba(17,102,255,.3);
  font-family:'Barlow Condensed','Arial Narrow',sans-serif;
  transform:scale(1.06);opacity:.95;
}
.drag-hint-bar{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--txt3);text-align:center;padding:3px 0 2px;flex-shrink:0;
}
.pilot-card.is-dragging{opacity:.22;transform:scale(.95);transition:opacity .1s,transform .1s;}
/* Toast notification */
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
</style>

<body data-theme="dark">
<div id="app">

  <div id="hdr">
    <div class="log-pull" onclick="openLog()">
      <span class="log-label">LOG</span>
      <span class="log-arr">&#9660;</span>
    </div>
    <span class="date-str" id="hdr-date"></span>
    <div class="hdr-btns">
      <button class="hdr-btn" id="theme-btn" onclick="toggleTheme()">LIGHT</button>
      <button class="hdr-btn" onclick="openPresets()">+ PRESETS</button>
    </div>
  </div>

  <div class="panel" id="top-panel">
    <div class="panel-label">AIRBORNE <span class="cnt" id="abn-count"></span></div>
    <div id="airborne-scroll">
      <div class="no-abn" id="abn-empty">NO FLIGHTS AIRBORNE</div>
    </div>
  </div>

  <div class="panel" id="composer-panel">
    <div id="mode-bar">
      <span class="swipe-hint L">&#8592;</span>
      <div class="mode-tabs">
        <div class="mode-tab active" id="mb-aerotow" onclick="setMode('aerotow')">AEROTOW</div>
        <div class="mode-tab" id="mb-single" onclick="setMode('single')">SINGLE</div>
      </div>
      <span class="swipe-hint R">&#8594;</span>
    </div>
    <div id="composer-body"></div>
  </div>

  <div class="panel" id="bottom-panel">
    <div id="bottom-content"></div>
  </div>

  <!-- LOG OVERLAY -->
  <div id="log-overlay">
    <div class="log-hdr">
      <span class="log-hdr-title">FLIGHT LOG</span>
      <button class="log-hdr-btn export" onclick="exportPDF()">EXPORT PDF</button>
      <button class="log-hdr-btn" onclick="closeLog()">CLOSE</button>
    </div>
    <div class="log-filter-bar">
      <span class="filter-lbl">FILTER</span>
      <select class="filter-sel" id="filter-sel" onchange="applyFilter()">
        <option value="">ALL FLIGHTS</option>
      </select>
      <button class="filter-all" onclick="clearFilter()">ALL</button>
      <button class="filter-tz-btn" id="tz-btn" onclick="toggleTZ()">UTC</button>
    </div>
    <div class="log-stats" id="log-stats"></div>
    <div class="log-wrap">
      <table class="log-tbl">
        <thead><tr>
          <th>#</th><th>AC TYPE</th><th>REG</th>
          <th>PILOT 1</th><th>PILOT 2</th>
          <th>T/O</th><th>LDG</th><th>DUR</th><th>NOTE</th>
        </tr></thead>
        <tbody id="log-tbody"></tbody>
      </table>
      <div class="log-empty" id="log-empty" style="display:none">NO FLIGHTS LOGGED</div>
    </div>
  </div>

  <!-- PRESETS OVERLAY -->
  <div id="presets-overlay">
    <div class="presets-hdr">
      <span class="presets-title">DAY'S PRESETS</span>
      <button class="presets-close" onclick="closePresets()">DONE</button>
    </div>
    <div id="presets-scroll"></div>
  </div>

  <!-- TIME MODAL -->
  <div id="time-modal">
    <div class="tmodal-box">
      <div class="tmodal-title" id="tmodal-title">SET TIME</div>
      <input type="time" class="tmodal-in" id="tmodal-in">
      <div class="tmodal-btns">
        <button class="tmodal-cancel" onclick="closeTimeModal()">CANCEL</button>
        <button class="tmodal-ok" onclick="confirmTime()">SET</button>
      </div>
    </div>
  </div>

</div>
<script>
/* ======= UTILS ======= */
const p2 = n => String(n).padStart(2,'0');
const uid = () => Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const getNow = () => { const d=new Date(); return p2(d.getHours())+':'+p2(d.getMinutes()); };
const calcDur = (t1,t2) => {
  const [h1,m1]=t1.split(':').map(Number),[h2,m2]=t2.split(':').map(Number);
  let m=(h2*60+m2)-(h1*60+m1); if(m<0)m+=1440;
  return p2(Math.floor(m/60))+':'+p2(m%60);
};
const durMins = s => { if(!s)return 0; const [h,m]=s.split(':').map(Number); return h*60+m; };
const dateStr = () => {
  const d=new Date();
  return ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()]+' '+
    p2(d.getDate())+' '+
    ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()]+' '+
    d.getFullYear();
};
const fullDate = () => {
  const d=new Date();
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()]+', '+
    d.getDate()+'. '+
    ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()]+
    ' '+d.getFullYear();
};

/* ======= STATE ======= */
const S = {
  theme:'dark', mode:'aerotow',
  planes:[], pilots:[],
  comp:{
    tow:{plane:null,pilot:null},
    glider:{plane:null,pilots:[null,null]},
    single:{plane:null,pilots:[null,null]},
  },
  focus:null,    // {slot, sub}
  bmode:'idle',  // idle|planes|pilots|ready|landing
  airborne:[], log:[], takeoffs:0,
  landId:null, landSlot:null,
  logFilter:'', timeCb:null,
  utcMode: false,
  airport: '',
  recentConfigs: [],  // up to 5 most-recent takeoff configurations
};
let Fs={fn:'glider',seats:1};
let Qa={fn:'glider',seats:1}; // quick-add state in composer bottom

/* ======= PERSIST ======= */
function save(){
  try{
    localStorage.setItem('gl5',JSON.stringify({
      theme:S.theme, airport:S.airport,
      planes:S.planes, pilots:S.pilots,
      log:S.log, airborne:S.airborne, takeoffs:S.takeoffs,
      recentConfigs:S.recentConfigs,
      date:new Date().toDateString()
    }));
  }catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem('gl5'); if(!raw)return;
    const d=JSON.parse(raw);
    S.theme=d.theme||'dark';
    S.airport=d.airport||'';
    S.planes=d.planes||[]; S.pilots=d.pilots||[];
    S.recentConfigs=d.recentConfigs||[];
    if(d.date===new Date().toDateString()){
      S.log=d.log||[]; S.airborne=d.airborne||[]; S.takeoffs=d.takeoffs||0;
    }
  }catch(e){}
}

/* ======= THEME ======= */
function applyTheme(){
  document.body.setAttribute('data-theme',S.theme);
  document.getElementById('theme-btn').textContent=S.theme==='dark'?'LIGHT':'DARK';
}
function toggleTheme(){ S.theme=S.theme==='dark'?'light':'dark'; applyTheme(); save(); }

/* ======= CLOCK ======= */
function tickClock(){
  const t=getNow();
  document.querySelectorAll('.live-clock').forEach(el=>el.textContent=t);
}
setInterval(tickClock,8000);

/* ======= SWIPE — single handler, attached once ======= */
function initSwipe(){
  const panel=document.getElementById('composer-panel');
  let sx=null,sy=null,st=null;
  panel.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; st=Date.now();
  },{passive:true});
  panel.addEventListener('touchmove',e=>{
    // allow vertical scroll inside bottom grid by not blocking
  },{passive:true});
  panel.addEventListener('touchend',e=>{
    if(sx===null)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    const dt=Date.now()-st;
    // swipe: clearly horizontal, fast, not on interactive element
    const tgt=e.target;
    const skip=tgt.tagName==='BUTTON'||tgt.tagName==='INPUT'||tgt.closest('.slot-clr,.mode-tabs');
    if(!skip && Math.abs(dx)>Math.abs(dy)*1.5 && Math.abs(dx)>50 && dt<450){
      applyModeSwipe(dx>0?'right':'left');
    }
    sx=null; sy=null; st=null;
  },{passive:true});
}

function applyModeSwipe(dir){
  const next=S.mode==='aerotow'?'single':'aerotow';
  setModeAnim(next, dir==='left'?'sl':'sr');
}

function setMode(m){
  // called by tab clicks — animate opposite direction
  if(S.mode===m)return;
  setModeAnim(m, m==='single'?'sl':'sr');
}

function setModeAnim(m,animCls){
  S.mode=m; resetComp();
  document.getElementById('mb-aerotow').classList.toggle('active',m==='aerotow');
  document.getElementById('mb-single').classList.toggle('active',m==='single');
  renderComp(animCls); renderBottom();
}

/* ======= COMPOSER LOGIC ======= */
function resetComp(){
  S.comp={
    tow:{plane:null,pilot:null},
    glider:{plane:null,pilots:[null,null]},
    single:{plane:null,pilots:[null,null]},
  };
  S.focus=null; S.bmode='idle';
}
function clearComp(){ resetComp(); renderComp(); renderBottom(); }

function isReady(){
  if(S.mode==='aerotow')
    return !!(S.comp.tow.plane&&S.comp.tow.pilot&&S.comp.glider.plane&&S.comp.glider.pilots[0]);
  return !!(S.comp.single.plane&&S.comp.single.pilots[0]);
}

function clickSlot(slot){
  const plane=slot==='tow'?S.comp.tow.plane:slot==='glider'?S.comp.glider.plane:S.comp.single.plane;
  if(plane){
    // Plane already chosen — jump directly to the first unfilled pilot slot
    let sub='p0';
    if(slot==='glider')      sub=S.comp.glider.pilots[0]?'p1':'p0';
    else if(slot==='single') sub=S.comp.single.pilots[0]?'p1':'p0';
    S.focus={slot,sub}; S.bmode='pilots';
  } else {
    S.focus={slot,sub:'plane'}; S.bmode='planes';
  }
  renderComp(); renderBottom();
}

/* Tap a specific pilot chip to focus exactly that pilot slot */
function focusPilotSlot(slot,sub,ev){
  ev.stopPropagation();
  const plane=slot==='tow'?S.comp.tow.plane:slot==='glider'?S.comp.glider.plane:S.comp.single.plane;
  if(!plane){clickSlot(slot);return;} // no plane yet — go to plane selection
  S.focus={slot,sub}; S.bmode='pilots';
  renderComp(); renderBottom();
}

function selectPlaneById(id){
  const pl=S.planes.find(p=>p.id===id); if(!pl)return;
  const slot=S.focus.slot;
  if(slot==='tow'){ S.comp.tow.plane=pl; S.focus={slot:'tow',sub:'p0'}; }
  else if(slot==='glider'){ S.comp.glider.plane=pl; S.comp.glider.pilots=[null,null]; S.focus={slot:'glider',sub:'p0'}; }
  else{ S.comp.single.plane=pl; S.comp.single.pilots=[null,null]; S.focus={slot:'single',sub:'p0'}; }
  S.bmode='pilots'; renderComp(); renderBottom();
  setTimeout(()=>{ const el=document.getElementById('new-pilot-in'); if(el)el.focus(); },100);
}

/* ======= AIRBORNE / COMPOSER HELPERS ======= */

/* Pilot names currently in the air (not yet landed) */
function getAirbornePilots(){
  const s=new Set();
  S.airborne.forEach(en=>{
    if(en.type==='aerotow'){
      if(!en.tow.ldgTime   && en.tow.pilot)               s.add(en.tow.pilot);
      if(!en.glider.ldgTime) en.glider.pilots.filter(Boolean).forEach(p=>s.add(p));
    } else {
      if(!en.ldgTime) en.pilots.filter(Boolean).forEach(p=>s.add(p));
    }
  });
  return s;
}

/* Plane registrations currently airborne */
function getAirbornePlaneRegs(){
  const s=new Set();
  S.airborne.forEach(en=>{
    if(en.type==='aerotow'){
      if(!en.tow.ldgTime)    s.add(en.tow.plane.reg);
      if(!en.glider.ldgTime) s.add(en.glider.plane.reg);
    } else {
      if(!en.ldgTime) s.add(en.plane.reg);
    }
  });
  return s;
}

/* Pilots already in the current composition, EXCEPT the slot being filled right now */
function getComposerPilotsExcludingCurrent(){
  const focus=S.focus||{};
  const s=new Set();
  if(focus.slot!=='tow' && S.comp.tow.pilot) s.add(S.comp.tow.pilot);
  S.comp.glider.pilots.forEach((p,i)=>{
    if(p && !(focus.slot==='glider' && focus.sub===(i===0?'p0':'p1'))) s.add(p);
  });
  S.comp.single.pilots.forEach((p,i)=>{
    if(p && !(focus.slot==='single' && focus.sub===(i===0?'p0':'p1'))) s.add(p);
  });
  return s;
}

/* ======= RECENT CONFIGS ======= */

/* Snapshot the current comp state (called just before logTakeoff resets everything) */
function saveRecentConfig(){
  const cfg={id:uid(), ts:Date.now(), mode:S.mode};
  if(S.mode==='aerotow'){
    cfg.tow   ={plane:{...S.comp.tow.plane},   pilot:S.comp.tow.pilot};
    cfg.glider={plane:{...S.comp.glider.plane}, pilots:[...S.comp.glider.pilots]};
  } else {
    cfg.single={plane:{...S.comp.single.plane}, pilots:[...S.comp.single.pilots]};
  }
  S.recentConfigs.unshift(cfg);
  if(S.recentConfigs.length>5) S.recentConfigs.length=5;
}

/* Load a stored config back into the composer, skipping airborne planes/pilots */
function loadRecentConfig(idx){
  const cfg=S.recentConfigs[idx]; if(!cfg)return;
  const abnPilots=getAirbornePilots();
  const abnRegs=getAirbornePlaneRegs();

  // Switch mode
  S.mode=cfg.mode;
  document.getElementById('mb-aerotow').classList.toggle('active',cfg.mode==='aerotow');
  document.getElementById('mb-single').classList.toggle('active',cfg.mode==='single');
  resetComp();

  if(cfg.mode==='aerotow'){
    const towPl =S.planes.find(p=>p.reg===cfg.tow.plane.reg);
    if(towPl && !abnRegs.has(towPl.reg)){
      S.comp.tow.plane=towPl;
      if(cfg.tow.pilot && !abnPilots.has(cfg.tow.pilot))
        S.comp.tow.pilot=cfg.tow.pilot;
    }
    const gliPl=S.planes.find(p=>p.reg===cfg.glider.plane.reg);
    if(gliPl && !abnRegs.has(gliPl.reg)){
      S.comp.glider.plane=gliPl;
      cfg.glider.pilots.forEach((p,i)=>{
        if(p && !abnPilots.has(p)) S.comp.glider.pilots[i]=p;
      });
    }
  } else {
    const sPl=S.planes.find(p=>p.reg===cfg.single.plane.reg);
    if(sPl && !abnRegs.has(sPl.reg)){
      S.comp.single.plane=sPl;
      cfg.single.pilots.forEach((p,i)=>{
        if(p && !abnPilots.has(p)) S.comp.single.pilots[i]=p;
      });
    }
  }

  // Move composer to next logical state
  S.bmode='idle';
  if(isReady()){ S.focus=null; S.bmode='ready'; }
  else advReady();

  renderComp('sl'); renderBottom();
}

function selectPilotByKey(el){ selectPilot(el.dataset.pilot); }

function selectPilot(name){
  // Hard block: pilot already in this same takeoff
  const composerPilots=getComposerPilotsExcludingCurrent();
  if(composerPilots.has(name)){
    showToast('ALREADY IN THIS TAKEOFF'); return;
  }
  // Hard block: pilot is currently airborne — cannot fly two planes simultaneously
  if(getAirbornePilots().has(name)){
    showToast(name.split(' ')[0].toUpperCase()+' IS AIRBORNE'); return;
  }
  const {slot,sub}=S.focus;
  if(slot==='tow'){
    S.comp.tow.pilot=name;
    if(S.mode==='aerotow'){
      if(!S.comp.glider.plane){S.focus={slot:'glider',sub:'plane'};S.bmode='planes';}
      else if(!S.comp.glider.pilots[0]){S.focus={slot:'glider',sub:'p0'};S.bmode='pilots';}
      else advReady();
    } else advReady();
  } else if(slot==='glider'){
    if(sub==='p0'){
      S.comp.glider.pilots[0]=name;
      if(S.comp.glider.plane&&S.comp.glider.plane.seats===2){S.focus={slot:'glider',sub:'p1'};}
      else advReady();
    } else { S.comp.glider.pilots[1]=name; advReady(); }
  } else {
    if(sub==='p0'){
      S.comp.single.pilots[0]=name;
      if(S.comp.single.plane&&S.comp.single.plane.seats===2){S.focus={slot:'single',sub:'p1'};}
      else advReady();
    } else { S.comp.single.pilots[1]=name; advReady(); }
  }
  renderComp(); renderBottom();
}

function skipP2(){ advReady(); renderComp(); renderBottom(); }

/* focus the new-pilot input (called by the + card in pilot grid) */
function focusNewPilot(){
  const el=document.getElementById('new-pilot-in');
  if(el){ el.focus(); el.scrollIntoView({block:'nearest'}); }
}

/* open quick-add plane form inline in the bottom panel */
function openQuickAddPlane(){
  const slot=S.focus?S.focus.slot:'single';
  // pre-set role to best match for the slot
  Qa.fn = slot==='tow'?'tow':slot==='glider'?'glider':'glider';
  Qa.seats=1;
  S.bmode='quickadd-plane';
  renderBottom();
}

function renderBQuickAddPlane(){
  const slot=S.focus?S.focus.slot:'single';
  const roles=slot==='tow'?['tow']:slot==='glider'?['glider']:['tow','motorized'];
  if(roles.length===1)Qa.fn=roles[0];
  const roleMap={tow:'tow-on',glider:'gli-on',motorized:'mot-on'};
  const roleSegs=roles.map(r=>`<div class="seg${Qa.fn===r?' '+roleMap[r]:''}" onclick="qaPickFn('${r}',this)">${r==='motorized'?'MOTOR':r.toUpperCase()}</div>`).join('');
  return `<div style="display:flex;flex-direction:column;height:100%;">
    <div class="bottom-lbl"><span>ADD NEW AIRCRAFT</span><span class="bottom-lbl-r" onclick="S.bmode='planes';renderBottom()">&#8592; BACK</span></div>
    <div class="qadd-form">
      <div class="form-row">
        <span class="form-lbl">REG</span>
        <input class="form-in" id="qa-reg" placeholder="OK-1234" autocomplete="off" autocapitalize="characters" style="text-transform:uppercase;">
      </div>
      <div class="form-row">
        <span class="form-lbl">TYPE</span>
        <input class="form-in" id="qa-type" placeholder="ASK-21" autocomplete="off" autocapitalize="characters" style="text-transform:uppercase;">
      </div>
      ${roles.length>1?`<div class="form-row"><span class="form-lbl">ROLE</span><div class="form-seg">${roleSegs}</div></div>`:''}
      <div class="form-row">
        <span class="form-lbl">SEATS</span>
        <div class="form-seg">
          <div class="seg${Qa.seats===1?' on':''}" onclick="qaPickSeats(1,this)">1</div>
          <div class="seg${Qa.seats===2?' on':''}" onclick="qaPickSeats(2,this)">2</div>
        </div>
      </div>
      <button class="form-submit" onclick="quickAddPlane()">ADD &amp; SELECT</button>
    </div>
  </div>`;
}

function qaPickFn(fn,el){
  Qa.fn=fn;
  el.parentElement.querySelectorAll('.seg').forEach(b=>b.className='seg');
  el.classList.add({tow:'tow-on',glider:'gli-on',motorized:'mot-on'}[fn]);
}
function qaPickSeats(n,el){
  Qa.seats=n;
  el.parentElement.querySelectorAll('.seg').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}
function quickAddPlane(){
  const reg=(document.getElementById('qa-reg').value||'').trim().toUpperCase();
  const type=(document.getElementById('qa-type').value||'').trim().toUpperCase();
  if(!reg||!type){alert('Enter registration and type.');return;}
  if(S.planes.find(p=>p.reg===reg)){alert('Registration already exists.');return;}
  const pl={id:uid(),reg,type,fn:Qa.fn,seats:Qa.seats};
  S.planes.push(pl); save();
  selectPlaneById(pl.id); // auto-selects and advances the composer
}
function bindQaInputs(){
  const r=document.getElementById('qa-reg');
  const t=document.getElementById('qa-type');
  if(r)r.addEventListener('keydown',e=>{if(e.key==='Enter'&&t)t.focus();});
  if(t)t.addEventListener('keydown',e=>{if(e.key==='Enter')quickAddPlane();});
  setTimeout(()=>{if(r)r.focus();},80);
}

function advReady(){
  if(isReady()){S.focus=null;S.bmode='ready';return;}
  if(S.mode==='aerotow'){
    if(!S.comp.tow.plane){S.focus={slot:'tow',sub:'plane'};S.bmode='planes';}
    else if(!S.comp.tow.pilot){S.focus={slot:'tow',sub:'p0'};S.bmode='pilots';}
    else if(!S.comp.glider.plane){S.focus={slot:'glider',sub:'plane'};S.bmode='planes';}
    else{S.focus={slot:'glider',sub:'p0'};S.bmode='pilots';}
  } else {
    if(!S.comp.single.plane){S.focus={slot:'single',sub:'plane'};S.bmode='planes';}
    else{S.focus={slot:'single',sub:'p0'};S.bmode='pilots';}
  }
}

function clearSlot(slot,ev){
  ev.stopPropagation();
  if(slot==='tow')S.comp.tow={plane:null,pilot:null};
  else if(slot==='glider')S.comp.glider={plane:null,pilots:[null,null]};
  else S.comp.single={plane:null,pilots:[null,null]};
  S.focus=null; S.bmode='idle';
  if(isReady())S.bmode='ready';
  renderComp(); renderBottom();
}

/* ======= LOG TAKEOFF ======= */
function logTakeoff(t){
  const time=t||getNow(); S.takeoffs++;
  const num=S.takeoffs;
  if(S.mode==='aerotow'){
    S.airborne.push({id:uid(),type:'aerotow',num,toTime:time,
      tow:{plane:{...S.comp.tow.plane},pilot:S.comp.tow.pilot,ldgTime:null,dur:null},
      glider:{plane:{...S.comp.glider.plane},pilots:[...S.comp.glider.pilots],ldgTime:null,dur:null}
    });
  } else {
    S.airborne.push({id:uid(),type:'single',num,toTime:time,
      plane:{...S.comp.single.plane},pilots:[...S.comp.single.pilots],ldgTime:null,dur:null
    });
  }
  saveRecentConfig();   // snapshot before reset
  resetComp(); save(); renderAll();
}

/* ======= LOG LANDING ======= */
function startLanding(id,slot){
  S.landId=id; S.landSlot=slot; S.bmode='landing';
  renderAirborne(); renderBottom();   // airborne re-render shows the selection highlight
}
function cancelLand(){
  S.landId=null; S.landSlot=null; S.bmode='idle';
  renderAirborne(); renderBottom();   // airborne re-render clears the highlight
}

function logLanding(t){
  const time=t||getNow();
  const idx=S.airborne.findIndex(a=>a.id===S.landId); if(idx<0)return;
  const en=S.airborne[idx];
  if(en.type==='aerotow'){
    const sub=en[S.landSlot];
    sub.ldgTime=time; sub.dur=calcDur(en.toTime,time);
    if(en.tow.ldgTime&&en.glider.ldgTime){ aerotowToLog(en); S.airborne.splice(idx,1); }
  } else {
    en.ldgTime=time; en.dur=calcDur(en.toTime,time);
    singleToLog(en); S.airborne.splice(idx,1);
  }
  S.landId=null; S.landSlot=null; S.bmode='idle'; save(); renderAll();
}

function aerotowToLog(en){
  const pair=uid();
  S.log.push({id:uid(),num:en.num,toTime:en.toTime,fn:'tow',
    reg:en.tow.plane.reg,acType:en.tow.plane.type,
    pilots:[en.tow.pilot],ldgTime:en.tow.ldgTime,dur:en.tow.dur,note:'',pair});
  S.log.push({id:uid(),num:en.num,toTime:en.toTime,fn:en.glider.plane.fn,
    reg:en.glider.plane.reg,acType:en.glider.plane.type,
    pilots:en.glider.pilots.filter(Boolean),ldgTime:en.glider.ldgTime,dur:en.glider.dur,note:'',pair});
}
function singleToLog(en){
  S.log.push({id:uid(),num:en.num,toTime:en.toTime,fn:en.plane.fn,
    reg:en.plane.reg,acType:en.plane.type,
    pilots:en.pilots.filter(Boolean),ldgTime:en.ldgTime,dur:en.dur,note:'',pair:null});
}

/* ======= PILOT DRAG & DROP ENGINE ======= */
let _pilotDrag = null;

function initPilotDrag(){
  document.querySelectorAll('#bottom-content .pilot-card:not(.add-new)').forEach(card=>{
    card.addEventListener('touchstart', _onPilotTouchStart, {passive:true});
    card.addEventListener('touchmove',  _onPilotTouchMove,  {passive:false});
    card.addEventListener('touchend',   _onPilotTouchEnd,   {passive:true});
    card.addEventListener('touchcancel',_onPilotTouchCancel,{passive:true});
  });
}

function _onPilotTouchStart(e){
  if(e.touches.length!==1) return;
  const t=e.touches[0];
  const rect=this.getBoundingClientRect();
  this._pdStart={
    x:t.clientX, y:t.clientY, id:t.identifier, active:false,
    // Offset of finger within card — keeps ghost aligned to touch point
    offX:t.clientX-rect.left, offY:t.clientY-rect.top, rect
  };
}

function _onPilotTouchMove(e){
  const info=this._pdStart; if(!info) return;
  const touch=[...e.touches].find(x=>x.identifier===info.id); if(!touch) return;
  const dx=touch.clientX-info.x, dy=touch.clientY-info.y;

  if(!info.active){
    if(Math.hypot(dx,dy)<10) return; // 10px dead zone — tighter = snappier
    info.active=true;
    const name=this.dataset.pilot;
    const r=info.rect;

    const ghost=document.createElement('div');
    ghost.className='pilot-drag-ghost';
    ghost.textContent=name;
    ghost.style.width=r.width+'px';
    // Start ghost exactly under finger
    ghost.style.left=(touch.clientX-info.offX)+'px';
    ghost.style.top =(touch.clientY-info.offY)+'px';
    document.body.appendChild(ghost);

    // Pop-in: spring from slightly small to slightly large
    ghost.animate(
      [{transform:'scale(0.82)',opacity:0.4},{transform:'scale(1.06)',opacity:0.95}],
      {duration:160, fill:'forwards', easing:'cubic-bezier(0.34,1.56,0.64,1)'}
    );

    _pilotDrag={name, ghost, offX:info.offX, offY:info.offY, srcCard:this};
    this.classList.add('is-dragging');
  }

  if(info.active && _pilotDrag){
    const g=_pilotDrag.ghost;
    g.style.left=(touch.clientX-_pilotDrag.offX)+'px';
    g.style.top =(touch.clientY-_pilotDrag.offY)+'px';

    // Highlight chips — slightly expanded hit area for comfort
    document.querySelectorAll('.p-chip[data-slot]').forEach(chip=>{
      const cr=chip.getBoundingClientRect(); const pad=8;
      chip.classList.toggle('drop-over',
        touch.clientX>=cr.left-pad && touch.clientX<=cr.right+pad &&
        touch.clientY>=cr.top -pad && touch.clientY<=cr.bottom+pad);
    });
    e.preventDefault(); // suppress scroll only while truly dragging
  }
}

function _onPilotTouchEnd(e){ _cleanupPilotDrag(e.changedTouches[0]); }
function _onPilotTouchCancel(){ _cleanupPilotDrag(null); }

function _cleanupPilotDrag(touch){
  const drag=_pilotDrag;
  document.querySelectorAll('.pilot-card.is-dragging').forEach(c=>c.classList.remove('is-dragging'));
  document.querySelectorAll('#bottom-content .pilot-card').forEach(c=>{ c._pdStart=null; });
  document.querySelectorAll('.p-chip.drop-over').forEach(c=>c.classList.remove('drop-over'));

  if(drag){
    _pilotDrag=null;
    let dropped=false;
    if(touch && drag.name){
      document.querySelectorAll('.p-chip[data-slot]').forEach(chip=>{
        const cr=chip.getBoundingClientRect(); const pad=8;
        if(touch.clientX>=cr.left-pad && touch.clientX<=cr.right+pad &&
           touch.clientY>=cr.top -pad && touch.clientY<=cr.bottom+pad){
          dropped=true;
          // Animate ghost snapping into chip before removing
          const cr2=chip.getBoundingClientRect();
          drag.ghost.animate(
            [{},{left:cr2.left+'px', top:cr2.top+'px', width:cr2.width+'px', transform:'scale(1)', opacity:0.5}],
            {duration:120, fill:'forwards', easing:'ease-in'}
          );
          setTimeout(()=>{ drag.ghost.remove(); dropPilotToSlot(drag.name,chip.dataset.slot,chip.dataset.sub); },110);
        }
      });
    }
    if(!dropped){
      // Snap ghost back and fade out
      drag.ghost.animate([{},{opacity:0,transform:'scale(0.8)'}],{duration:180,fill:'forwards',easing:'ease-in'});
      setTimeout(()=>drag.ghost.remove(),175);
    }
  }
}

/* Assign a pilot to a specific slot/sub via drag-and-drop.
   - If dragged pilot is already in the SAME plane at the OTHER sub → swap seats.
   - If dragged pilot is already in a DIFFERENT slot of this takeoff → block (toast).
   - Otherwise → assign. */
function dropPilotToSlot(dragName, targetSlot, targetSub){
  const targetIdx=targetSub==='p0'?0:1;

  // Check for same-plane swap first
  if(targetSlot==='glider'){
    const ps=S.comp.glider.pilots;
    const srcIdx=ps.indexOf(dragName);
    if(srcIdx!==-1 && srcIdx!==targetIdx){
      // Swap
      [ps[0],ps[1]]=[ps[1],ps[0]];
      if(isReady()){S.focus=null;S.bmode='ready';} else advReady();
      renderComp(); renderBottom(); return;
    }
  } else if(targetSlot==='single'){
    const ps=S.comp.single.pilots;
    const srcIdx=ps.indexOf(dragName);
    if(srcIdx!==-1 && srcIdx!==targetIdx){
      [ps[0],ps[1]]=[ps[1],ps[0]];
      if(isReady()){S.focus=null;S.bmode='ready';} else advReady();
      renderComp(); renderBottom(); return;
    }
  }

  // Collect all occupied slots EXCEPT the target destination
  const occupied=new Set();
  if(targetSlot!=='tow' && S.comp.tow.pilot) occupied.add(S.comp.tow.pilot);
  S.comp.glider.pilots.forEach((p,i)=>{
    if(p && !(targetSlot==='glider' && (i===0?'p0':'p1')===targetSub)) occupied.add(p);
  });
  S.comp.single.pilots.forEach((p,i)=>{
    if(p && !(targetSlot==='single' && (i===0?'p0':'p1')===targetSub)) occupied.add(p);
  });

  if(occupied.has(dragName)){
    showToast('ALREADY IN THIS TAKEOFF'); return;
  }
  // Hard block: pilot is airborne — cannot be re-used while still in the air
  if(getAirbornePilots().has(dragName)){
    showToast(dragName.split(' ')[0].toUpperCase()+' IS AIRBORNE'); return;
  }

  // Normal assign
  if(targetSlot==='tow')          S.comp.tow.pilot=dragName;
  else if(targetSlot==='glider')  S.comp.glider.pilots[targetIdx]=dragName;
  else                            S.comp.single.pilots[targetIdx]=dragName;

  if(isReady()){S.focus=null;S.bmode='ready';} else advReady();
  renderComp(); renderBottom();
}

function renderBIdle(){
  return `<div class="bottom-idle">
    <div class="idle-hint">TAP A SLOT ABOVE TO BEGIN</div>
    <button class="hdr-btn" style="margin-top:6px;" onclick="openPresets()">MANAGE PRESETS</button>
  </div>`;
}

function renderBPlanes(){
  const fns=S.focus.slot==='tow'?['tow']:S.focus.slot==='glider'?['glider']:['tow','motorized'];
  const lbl={tow:'TOWPLANE',glider:'GLIDER',single:'TOW / MOTORIZED'}[S.focus.slot];
  const list=S.planes.filter(p=>fns.includes(p.fn));
  const cards=list.map(p=>`<div class="plane-card ${p.fn}" onclick="selectPlaneById('${p.id}')">
      <div class="pc-reg ${p.fn}">${p.reg}</div>
      <div class="pc-type">${p.type}</div>
      <div class="pc-seats">${p.seats} SEAT${p.seats>1?'S':''}</div>
    </div>`).join('');
  const addCard=`<div class="plane-card add-new" onclick="openQuickAddPlane()">
    <div class="add-new-plus">+</div>
    <div class="add-new-lbl">NEW</div>
  </div>`;
  return `<div style="display:flex;flex-direction:column;height:100%;">
    <div class="bottom-lbl"><span>SELECT ${lbl}</span></div>
    <div class="sel-grid">${cards}${addCard}</div>
  </div>`;
}

function renderBPilots(){
  const isP2=S.focus&&S.focus.sub==='p1';
  const label=isP2?'PILOT 2':'PILOT 1';
  const slot=S.focus?S.focus.slot:'';
  const plane=slot==='tow'?S.comp.tow.plane:slot==='glider'?S.comp.glider.plane:S.comp.single.plane;
  const planeHint=plane?` — ${plane.reg}`:'';

  const abnPilots=getAirbornePilots();
  const compPilots=getComposerPilotsExcludingCurrent();

  const cards=S.pilots.map(p=>{
    const isAbn=abnPilots.has(p);
    const inComp=compPilots.has(p);
    const blocked=isAbn||inComp;
    const note=isAbn?'AIRBORNE':inComp?'IN USE':'';
    return `<div class="pilot-card${blocked?' pilot-unavail':''}"
      data-pilot="${p.replace(/"/g,'&quot;')}"
      onclick="selectPilotByKey(this)"
      style="${blocked?'pointer-events:none;':''}">
      <span>${p}</span>
      ${note?`<span class="pilot-unavail-note">${note}</span>`:''}
    </div>`;
  }).join('');

  const addCard=`<div class="pilot-card add-new" onclick="focusNewPilot()">
    <div class="add-new-plus">+</div>
    <div class="add-new-lbl">NEW</div>
  </div>`;
  const dragHint=S.pilots.length?`<div class="drag-hint-bar">DRAG ↑ TO SLOT &nbsp;·&nbsp; TAP TO ASSIGN</div>`:'';
  const soloBtn=isP2?`<div style="padding:4px 6px 0;flex-shrink:0;"><button class="btn-solo-full" onclick="skipP2()">SOLO — NO SECOND PILOT</button></div>`:'';
  const scrollHint=S.pilots.length>3?`<div class="pilots-scroll-hint">← SCROLL →</div>`:'';

  return `<div style="display:flex;flex-direction:column;height:100%;">
    <div class="bottom-lbl"><span>SELECT ${label}${planeHint}</span></div>
    ${dragHint}
    <div class="pilots-scroll-wrap">
      <div class="pilots-grid">${cards}${addCard}</div>
    </div>
    ${scrollHint}${soloBtn}
    <div class="pilot-new-row">
      <input type="text" class="pilot-text-in" id="new-pilot-in"
             placeholder="Tap to type a new name..."
             autocomplete="off" autocorrect="off" autocapitalize="words">
      <button class="pilot-add-btn" onclick="confirmNewPilot()">ADD</button>
    </div>
  </div>`;
}

function bindPilotInput(){
  const el=document.getElementById('new-pilot-in');
  if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter')confirmNewPilot(); });
}

function confirmNewPilot(){
  const el=document.getElementById('new-pilot-in');
  const name=(el&&el.value.trim())||''; if(!name)return;
  if(!S.pilots.includes(name)){ S.pilots.push(name); save(); }
  selectPilot(name);
}

    <button class="btn-log takeoff" onclick="logTakeoff()">
      <span class="clk live-clock">${getNow()}</span>

}

function renderBLand(){
  const en=S.airborne.find(a=>a.id===S.landId);
  if(!en){ cancelLand(); return renderBIdle(); }
  const isAero=en.type==='aerotow';
  const reg=isAero?en[S.landSlot].plane.reg:en.plane.reg;
  const pilots=isAero
    ?(S.landSlot==='tow'?[en.tow.pilot]:en.glider.pilots.filter(Boolean))
    :en.pilots.filter(Boolean);
  const pilotStr=pilots.join(' · ')||'—';
  return `<div style="display:flex;flex-direction:column;height:100%;">
    <div class="land-ctx" style="padding:6px 10px;background:rgba(221,17,17,.10);border-bottom:1px solid rgba(221,17,17,.25);display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <span style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);">&#9660; LANDING</span>
      <span style="font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:600;color:var(--txt);">${reg}</span>
      <span style="font-size:13px;color:var(--txt2);flex:1;">${pilotStr}</span>
      <span style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--txt2);">T/O ${en.toTime}</span>

/* ======= UTC / TIME DISPLAY ======= */
/* getTimezoneOffset() = (UTC - local) in minutes, so UTC = local + offset */
function localToUTC(t){
  if(!t||!t.includes(':')) return t;
  const [h,m]=t.split(':').map(Number);
  const off=new Date().getTimezoneOffset(); // positive = west of UTC
  let tot=((h*60+m+off)%1440+1440)%1440;
  return p2(Math.floor(tot/60))+':'+p2(tot%60);
}
function displayTime(t){
  if(!t) return null;
  return S.utcMode ? localToUTC(t) : t;
}
function toggleTZ(){
  S.utcMode=!S.utcMode;
  const btn=document.getElementById('tz-btn');
  if(btn){ btn.textContent=S.utcMode?'LOCAL':'UTC'; btn.classList.toggle('utc-on',S.utcMode); }
  renderLog();
}

function showToast(msg, ms=1800){

    'background:var(--red);color:#fff;font-family:"Barlow Condensed",sans-serif;'+
    'font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;'+
    'padding:8px 16px;border-radius:3px;z-index:9999;pointer-events:none;'+
    'animation:toastIn .2s ease-out;white-space:nowrap;';
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>{ el.style.animation='toastOut .2s ease-in'; setTimeout(()=>el.remove(),200); }, ms);
}

/* ======= LOG EDITING ======= */
function editLogTime(entryId, field){
  const e=S.log.find(x=>x.id===entryId); if(!e)return;
  document.getElementById('tmodal-title').textContent=field==='to'?'EDIT TAKEOFF TIME':'EDIT LANDING TIME';
  document.getElementById('tmodal-in').value=(field==='to'?e.toTime:e.ldgTime)||getNow();
  document.getElementById('time-modal').classList.add('open');
  S.timeCb=time=>{
    if(field==='to'){
      e.toTime=time;
      // Aerotow pairs share the same takeoff time — sync partner
      if(e.pair) S.log.filter(x=>x.pair===e.pair&&x.id!==e.id).forEach(x=>{
        x.toTime=time;
        if(x.ldgTime) x.dur=calcDur(x.toTime,x.ldgTime);
      });
      if(e.ldgTime) e.dur=calcDur(e.toTime,e.ldgTime);
    } else {
      e.ldgTime=time;
      if(e.toTime) e.dur=calcDur(e.toTime,e.ldgTime);
    }
    save(); renderLog();
  };
}

function editLogPilot(entryId, idx){
  const e=S.log.find(x=>x.id===entryId); if(!e)return;
  const cur=e.pilots[idx]||'';
  const nv=prompt(`Edit ${idx===0?'Pilot 1':'Pilot 2'} — ${e.reg} (${e.acType}):`, cur);
  if(nv!==null){ e.pilots[idx]=nv.trim(); save(); renderLog(); }
}

/* ======= RENDER: LOG ======= */
function renderLog(){
  const tbody=document.getElementById('log-tbody');
  const empty=document.getElementById('log-empty');
  const stats=document.getElementById('log-stats');

  let entries=[...S.log].sort((a,b)=>a.num!==b.num?a.num-b.num:(a.fn==='tow'?-1:1));
  if(S.logFilter){
    const [f,v]=S.logFilter.split('::');
    entries=entries.filter(e=>f==='reg'?e.reg===v:e.pilots.includes(v));
  }
  if(!entries.length){
    tbody.innerHTML=''; empty.style.display='flex';
    stats.textContent='NO ENTRIES'; return;
  }
  empty.style.display='none';
  const totM=entries.reduce((s,e)=>s+durMins(e.dur),0);
  const uq=[...new Set(entries.map(e=>e.num))].length;
  const tzTag=S.utcMode?' (UTC)':' (LCL)';
  stats.textContent=`${entries.length} FLIGHTS  |  ${uq} TAKEOFFS  |  TOTAL: ${p2(Math.floor(totM/60))}:${p2(totM%60)}${tzTag}`;

  const grp={};let zi=0;
  entries.forEach(e=>{
    const k=e.pair||('_'+e.num+'_'+e.id);
    if(!(k in grp)){grp[k]=zi%2;zi++;}
    e._z=grp[k];
  });

  tbody.innerHTML=entries.map(e=>{
    const bg=e._z===0?'background:var(--z1)':'';
    const fc=e.fn==='tow'?'var(--tow)':e.fn==='motorized'?'var(--mot)':'var(--gli)';
    const dTo=displayTime(e.toTime)||'—';
    const dLdg=displayTime(e.ldgTime)||'—';
    return `<tr style="${bg}">
      <td class="mono">${e.num}</td>
      <td style="font-size:11px">${e.acType}</td>
      <td class="mono" style="color:${fc}"><span class="fn-dot" style="background:${fc}"></span>${e.reg}</td>
      <td class="log-edit-td" style="font-size:12px;font-weight:600" onclick="editLogPilot('${e.id}',0)" title="Tap to edit">${e.pilots[0]||'—'}</td>
      <td class="log-edit-td" style="font-size:12px;color:var(--txt2)" onclick="editLogPilot('${e.id}',1)" title="Tap to edit">${e.pilots[1]||'+'}</td>
      <td class="log-edit-td mono" onclick="editLogTime('${e.id}','to')" title="Tap to edit">${dTo}</td>
      <td class="log-edit-td mono" onclick="editLogTime('${e.id}','ldg')" title="Tap to edit">${dLdg}</td>
      <td class="mono" style="font-weight:700">${e.dur||'—'}</td>
      <td class="note-td" onclick="editNote('${e.id}')">${e.note||'+'}</td>
    </tr>`;
  }).join('');
}

function editNote(id){

  const now=Date.now();
  if(now-_lt<80)e.preventDefault();
  _lt=now;
},{passive:false});

/* ======= PWA: APPLE-TOUCH-ICON + SERVICE WORKER ======= */
(function initPWA(){
  // Generate the app icon via Canvas — needed for iOS "Add to Home Screen"
  // (Android/Chrome uses icon.svg referenced in manifest.json)
  function drawIcon(ctx, s){
    const r = s * 0.16;
    // Clip to rounded square
    ctx.beginPath();
    ctx.moveTo(r,0); ctx.lineTo(s-r,0);
    ctx.arcTo(s,0,   s,  r,  r);
    ctx.lineTo(s,s-r);
    ctx.arcTo(s,s,   s-r,s,  r);
    ctx.lineTo(r,s);
    ctx.arcTo(0,s,   0,  s-r,r);
    ctx.lineTo(0,r);
    ctx.arcTo(0,0,   r,  0,  r);
    ctx.closePath();
    ctx.clip();
    // Background
    ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,s,s);
    // Orange stripe (bottom 20%)
    ctx.fillStyle='#e07800'; ctx.fillRect(0,s*.80,s,s*.20);
    // GL logotype
    ctx.fillStyle='#efefef';
    ctx.font=`900 ${Math.round(s*.44)}px "Arial Black",Arial,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText('ŠM',s/2,s*.72);
  }
  try {
    const c=document.createElement('canvas'); c.width=c.height=512;
    drawIcon(c.getContext('2d'),512);
    document.getElementById('pwa-apple-icon').href=c.toDataURL('image/png');
  } catch(e){}

  // Register service worker — enables offline use and the browser install prompt
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
  }
})();
</script>
